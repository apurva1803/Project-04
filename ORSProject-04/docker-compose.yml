version: '3'

services:
mysql:
image: mysql:8.0
container_name: ors-mysql
environment:
MYSQL_ROOT_PASSWORD: root
MYSQL_DATABASE: project04
ports:
- "3308:3306"
networks:
- mynetwork
volumes:
- mysql-data:/var/lib/mysql

webapp:
build:
context: ./ORSProject-04
container_name: ors-webapp
ports:
- "8888:8888"
depends_on:
- mysql
networks:
- mynetwork
environment:
DATABASE_URL: "jdbc:mysql://mysql:3306/project04"
DB_USERNAME: root
DB_PASSWORD: root

networks:
mynetwork:
driver: bridge

volumes:
mysql-data:
